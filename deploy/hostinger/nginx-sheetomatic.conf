# Hostinger VPS — Nginx site for Sheetomatic
# Install:
#   sudo cp deploy/hostinger/nginx-sheetomatic.conf /etc/nginx/sites-available/sheetomatic
#   sudo ln -sf /etc/nginx/sites-available/sheetomatic /etc/nginx/sites-enabled/sheetomatic
#   sudo certbot --nginx -d sheetomatic.com -d www.sheetomatic.com -d app.sheetomatic.com -d ai.sheetomatic.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# App listens on 127.0.0.1:3000 (docker compose.prod.yml).

upstream sheetomatic_app {
  server 127.0.0.1:3000;
  keepalive 32;
}

# Redirect bare HTTP → HTTPS (Certbot usually manages this block after first run)
server {
  listen 80;
  listen [::]:80;
  server_name sheetomatic.com www.sheetomatic.com app.sheetomatic.com ai.sheetomatic.com *.sheetomatic.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name sheetomatic.com www.sheetomatic.com app.sheetomatic.com ai.sheetomatic.com *.sheetomatic.com;

  # Replace with Certbot paths after: sudo certbot --nginx ...
  ssl_certificate     /etc/letsencrypt/live/sheetomatic.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sheetomatic.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 25m;

  location / {
    proxy_pass http://sheetomatic_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location /api/health {
    proxy_pass http://sheetomatic_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
  }
}
